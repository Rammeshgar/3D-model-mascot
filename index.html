        #ui {

            text-align: center; 
            color: white;

    // 3. LOAD THE 3D MODEL
    const loader = new GLTFLoader();
    loader.load('AI_Mascot.glb', (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.8, 0.8, 0.8); 
        model.position.y = 0.7; 
        scene.add(model);

        // --- FIND THE BONES AND MESH ---
        model.traverse((child) => {
            if (child.isMesh && child.morphTargetDictionary) {
                if(child.name.includes("Head") || child.name.includes("Avatar")) {
                    headMesh = child; 
                }
            }
            if (child.isBone) {
                const boneName = child.name.toLowerCase();
                if (boneName.includes('head')) {
                    headBone = child;
                } else if (boneName.includes('neck')) {
                    neckBone = child;
                }
            }
        });

        if (gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(model);
            const idleAction = mixer.clipAction(gltf.animations[0]);
            idleAction.play();
        }
    });

    // 4. THE SYNC LOOP
    let currentVisemeId = 0;

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        // Update the orbit controls
        controls.update();

        // 1. Update the breathing animation
        if (mixer) mixer.update(delta);

        // 2. Head tracking logic (Fixed inverted math!)
        if (headBone) {
            mouseX = THREE.MathUtils.lerp(mouseX, targetMouseX, 0.05);
            mouseY = THREE.MathUtils.lerp(mouseY, targetMouseY, 0.05);

            // Flipped the (-) signs here so he looks the correct direction
            headBone.rotation.y = mouseX * 0.5; 
            headBone.rotation.x = -mouseY * 0.4;  
            
            if (neckBone) {
                neckBone.rotation.y = mouseX * 0.3; 
                neckBone.rotation.x = -mouseY * 0.2;  
            }
        }

        // 3. Lip sync logic
        if (headMesh && !audio.paused) {
            const currentTime = audio.currentTime;
            const currentCue = mouthCues.find(cue => currentTime >= cue.start && currentTime <= cue.end);

            currentVisemeId = currentCue ? rhubarbToVisemeId[currentCue.value] : 0;
            const targetVisemeName = visemeMap[currentVisemeId];

            for (const [name, index] of Object.entries(headMesh.morphTargetDictionary)) {
                const targetWeight = (name === targetVisemeName) ? 1.0 : 0.0;
                headMesh.morphTargetInfluences[index] = THREE.MathUtils.lerp(
                    headMesh.morphTargetInfluences[index],
                    targetWeight,
                    0.4 
                );
            }
        } else if (headMesh && audio.paused) {
            for (let i = 0; i < headMesh.morphTargetInfluences.length; i++) {
                headMesh.morphTargetInfluences[i] = THREE.MathUtils.lerp(headMesh.morphTargetInfluences[i], 0, 0.2);
            }
        }

        renderer.render(scene, camera);
    }
    animate();

    // 5. BUTTON LISTENER
    document.getElementById('playBtn').addEventListener('click', () => {
        audio.currentTime = 0;
        audio.play();
    });

    // 6. WINDOW RESIZE FIX
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
